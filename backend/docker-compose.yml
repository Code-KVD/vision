version: '3.9'

services:
  # ─── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vision
      POSTGRES_PASSWORD: vision_secret
      POSTGRES_DB: vision_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Tune for high concurrency
      - ./infra/postgres.conf:/etc/postgresql/postgresql.conf
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vision -d vision_db']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend API ────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://vision:vision_secret@postgres:5432/vision_db
      REDIS_URL: redis://redis:6379
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000/health || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3

  # ─── Scale example: 3 API replicas behind nginx ─────────────────────────────
  # Uncomment to test horizontal scaling:
  # api-2:
  #   extends: api
  #   ports:
  #     - '3001:3000'
  # api-3:
  #   extends: api
  #   ports:
  #     - '3002:3000'
  # nginx:
  #   image: nginx:alpine
  #   ports:
  #     - '80:80'
  #   volumes:
  #     - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
  #   depends_on:
  #     - api

volumes:
  postgres_data:
  redis_data:
