# Nginx reverse proxy — load balances across API replicas
# Handles 100k concurrent connections with keep-alive and upstream pooling

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
    use epoll;
    multi_accept on;
}

http {
    # Upstream: round-robin across API instances
    upstream vision_api {
        least_conn;  # Route to least-busy server
        server api:3000;
        # server api-2:3000;
        # server api-3:3000;
        keepalive 64;  # Persistent connections to upstream
    }

    # Rate limiting zone (shared across workers)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;

    # ─── HTTP ──────────────────────────────────────────────────────────────────
    server {
        listen 80;

        # Timeouts
        client_body_timeout 10s;
        client_header_timeout 10s;
        keepalive_timeout 65s;
        send_timeout 10s;

        # Body size limit
        client_max_body_size 2m;

        # Security headers
        add_header X-Content-Type-Options nosniff;
        add_header X-Frame-Options DENY;
        add_header X-XSS-Protection "1; mode=block";

        # ─── WebSocket ─────────────────────────────────────────────────────────
        location /ws {
            proxy_pass http://vision_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 3600s;  # Keep WS connections alive for 1h
        }

        # ─── API ───────────────────────────────────────────────────────────────
        location / {
            limit_req zone=api_limit burst=100 nodelay;

            proxy_pass http://vision_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }
    }
}
