# PostgreSQL tuning for high-concurrency workloads (100k users)
# Adjust based on your actual server RAM / CPU

# ─── Connections ──────────────────────────────────────────────────────────────
# With 10 API replicas × 20 pool connections = 200 connections max
max_connections = 500

# ─── Memory ───────────────────────────────────────────────────────────────────
# Set to ~25% of total RAM (adjust to your server)
shared_buffers = 2GB

# Set to ~75% of total RAM for cache
effective_cache_size = 6GB

# Max memory for sort/hash operations per query
work_mem = 16MB

# Memory for maintenance operations (VACUUM, CREATE INDEX)
maintenance_work_mem = 256MB

# ─── WAL / Durability ─────────────────────────────────────────────────────────
# Sync WAL on commit — set to off only for non-critical workloads
synchronous_commit = on

# WAL writer flush interval
wal_writer_delay = 200ms

# ─── Query Planner ────────────────────────────────────────────────────────────
random_page_cost = 1.1         # SSD — lower value encourages index scans
effective_io_concurrency = 200 # SSD IOPS

# ─── Checkpoints ──────────────────────────────────────────────────────────────
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 80MB

# ─── Logging ──────────────────────────────────────────────────────────────────
log_min_duration_statement = 100  # Log queries slower than 100ms
log_checkpoints = on
log_connections = off             # Too noisy at scale
log_lock_waits = on

# ─── Autovacuum ───────────────────────────────────────────────────────────────
autovacuum = on
autovacuum_max_workers = 4
autovacuum_naptime = 30s
